<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="format-detection" content="telephone=no">

  <!-- Meta / OG tags -->
  <!-- ⚠️ 카카오톡/소셜 크롤러는 JS를 실행하지 않으므로 아래 '정적' 값이 실제로 사용됩니다.
       값을 바꾼 뒤에는 카카오 디버거(https://developers.kakao.com/tool/debugger/sharing)에서
       URL을 입력하고 '초기화'를 눌러 캐시를 비워야 새 썸네일이 반영됩니다. -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="최성준 ♥ 이지호 결혼합니다">
  <meta property="og:description" content="2026년 11월 21일, 소중한 분들을 초대합니다.">
  <meta property="og:image" content="https://nchoi0617.github.io/my-wedding/images/og/1.jpg?v=2">
  <meta property="og:image:width" content="1500">
  <meta property="og:image:height" content="2100">
  <meta name="description" content="2026년 11월 21일, 소중한 분들을 초대합니다.">

  <title>Wedding Invitation</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@200;300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
  <script src="config.js"></script>
</head>
<body>

  <!-- ═══ Curtain Opening Animation ═══ -->
  <div id="curtain" class="curtain">
    <div class="curtain__bg"></div>
    <div class="curtain__content">
      <div class="curtain__film-icon">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="2" y="2" width="20" height="20" rx="2"/><circle cx="12" cy="12" r="4"/><circle cx="12" cy="12" r="1.5"/><line x1="2" y1="8" x2="6" y2="8"/><line x1="18" y1="8" x2="22" y2="8"/><line x1="2" y1="16" x2="6" y2="16"/><line x1="18" y1="16" x2="22" y2="16"/></svg>
      </div>
      <p class="curtain__subtitle">Wedding Invitation</p>
      <p class="curtain__names" id="curtainNames"></p>
      <button class="curtain__btn" id="curtainBtn">초대장 열기</button>
    </div>
  </div>

  <!-- ═══ Film Grain Overlay ═══ -->
  <div class="film-grain" aria-hidden="true"></div>

  <!-- ═══ Toast Notification ═══ -->
  <div id="toast" class="toast" aria-live="polite"></div>

  <!-- ═══ Photo Viewer Modal ═══ -->
  <div id="photoModal" class="photo-modal" role="dialog" aria-modal="true" aria-label="사진 보기">
    <button class="photo-modal__close" id="modalClose" aria-label="닫기">&times;</button>
    <button class="photo-modal__nav photo-modal__nav--prev" id="modalPrev" aria-label="이전 사진">&#8249;</button>
    <button class="photo-modal__nav photo-modal__nav--next" id="modalNext" aria-label="다음 사진">&#8250;</button>
    <div class="photo-modal__container" id="modalContainer">
      <img class="photo-modal__img" id="modalImg" src="" alt="사진" draggable="false">
    </div>
    <div class="photo-modal__counter" id="modalCounter"></div>
  </div>

  <!-- ═══ RSVP Modal (참석 의사 폼) ═══ -->
  <div id="rsvpModal" class="rsvp-modal" role="dialog" aria-modal="true" aria-labelledby="rsvpModalTitle">
    <div class="rsvp-modal__sheet">
      <button class="rsvp-modal__close" id="rsvpModalClose" aria-label="닫기">&times;</button>
      <h2 class="rsvp-modal__title" id="rsvpModalTitle">참석 의사 전달</h2>
      <p class="rsvp-modal__desc" id="rsvpModalDesc"></p>

      <form class="rsvp__form" id="rsvpForm" novalidate>
        <div class="rsvp__field">
          <span class="rsvp__label">구분</span>
          <div class="rsvp__toggle" id="rsvpSide" role="group" aria-label="구분 선택">
            <button type="button" class="rsvp__toggle-btn is-active" data-value="신랑측">신랑측</button>
            <button type="button" class="rsvp__toggle-btn" data-value="신부측">신부측</button>
          </div>
        </div>

        <div class="rsvp__field">
          <span class="rsvp__label">참석 여부</span>
          <div class="rsvp__toggle" id="rsvpAttend" role="group" aria-label="참석 여부 선택">
            <button type="button" class="rsvp__toggle-btn is-active" data-value="참석">참석</button>
            <button type="button" class="rsvp__toggle-btn" data-value="불참">불참</button>
          </div>
        </div>

        <div class="rsvp__field">
          <label class="rsvp__label" for="rsvpName">성함</label>
          <input class="rsvp__input" id="rsvpName" name="name" type="text" placeholder="대표자 성함" autocomplete="name" maxlength="20">
        </div>

        <div class="rsvp__field" data-attend-only>
          <label class="rsvp__label" for="rsvpCompanionName">동행인 성함</label>
          <input class="rsvp__input" id="rsvpCompanionName" name="companionName" type="text" placeholder="함께 오시는 분 (선택)" maxlength="60">
        </div>

        <div class="rsvp__field" data-attend-only>
          <label class="rsvp__label" for="rsvpCompanionCount">동행인 수<small>(본인 제외)</small></label>
          <input class="rsvp__input" id="rsvpCompanionCount" name="companionCount" type="number" min="0" max="98" inputmode="numeric" placeholder="0">
        </div>

        <div class="rsvp__field" data-attend-only>
          <span class="rsvp__label">식사 여부</span>
          <div class="rsvp__toggle" id="rsvpMeal" role="group" aria-label="식사 여부 선택">
            <button type="button" class="rsvp__toggle-btn is-active" data-value="예정">예정</button>
            <button type="button" class="rsvp__toggle-btn" data-value="안함">안함</button>
            <button type="button" class="rsvp__toggle-btn" data-value="미정">미정</button>
          </div>
        </div>

        <div class="rsvp__field rsvp__field--message">
          <label class="rsvp__label" for="rsvpMessage">전달사항</label>
          <textarea class="rsvp__input rsvp__textarea" id="rsvpMessage" name="message" rows="3" placeholder="전하실 말씀이 있다면 남겨주세요 (선택)" maxlength="300"></textarea>
        </div>

        <label class="rsvp__consent">
          <input type="checkbox" id="rsvpConsent" class="rsvp__checkbox">
          <span class="rsvp__consent-text">개인정보 수집 및 이용에 동의합니다 <em>(필수)</em><br>
            <small>수집 항목: 성함·참석여부·동행인·식사여부·전달사항 · 보유기간: 예식 종료 시까지</small></span>
        </label>

        <button type="submit" class="rsvp__submit" id="rsvpSubmit">참석 의사 전달하기</button>
      </form>
    </div>
  </div>

  <!-- ═══ Main Content ═══ -->
  <main id="mainContent" class="main-content">

    <!-- ─── Hero Section ─── -->
    <section class="section hero" id="hero">
      <div class="hero__vignette"></div>
      <img class="hero__photo" id="heroPhoto" src="" alt="웨딩 사진" loading="eager">
      <div class="hero__content">
        <p class="hero__label animate-item" data-animate="fade-down">Wedding Invitation</p>
        <h1 class="hero__names animate-item" data-animate="fade-up" id="heroNames"></h1>
        <div class="hero__divider animate-item" data-animate="fade-in"></div>
        <p class="hero__date animate-item" data-animate="fade-up" id="heroDate"></p>
        <p class="hero__venue animate-item" data-animate="fade-up" id="heroVenue"></p>
      </div>

      <!-- Countdown -->
      <div class="countdown animate-item" data-animate="fade-up" id="countdown">
        <p class="countdown__label" id="countdownLabel"></p>
        <div class="countdown__timer">
          <div class="countdown__item">
            <span class="countdown__number" id="countDays">0</span>
            <span class="countdown__unit">일</span>
          </div>
          <div class="countdown__sep">:</div>
          <div class="countdown__item">
            <span class="countdown__number" id="countHours">0</span>
            <span class="countdown__unit">시간</span>
          </div>
          <div class="countdown__sep">:</div>
          <div class="countdown__item">
            <span class="countdown__number" id="countMinutes">0</span>
            <span class="countdown__unit">분</span>
          </div>
          <div class="countdown__sep">:</div>
          <div class="countdown__item">
            <span class="countdown__number" id="countSeconds">0</span>
            <span class="countdown__unit">초</span>
          </div>
        </div>
      </div>
    </section>

    <!-- ─── Greeting Section ─── -->
    <section class="section greeting" id="greeting">
      <div class="section__inner">
        <div class="ornament animate-item" data-animate="fade-in">&#9790;</div>
        <h2 class="section__title animate-item" data-animate="fade-up" id="greetingTitle"></h2>
        <p class="greeting__text animate-item" data-animate="fade-up" id="greetingContent"></p>
        <div class="greeting__parents animate-item" data-animate="fade-up" id="greetingParents"></div>
      </div>
    </section>

    <!-- ─── Calendar Section ─── -->
    <section class="section calendar-section" id="calendarSection">
      <div class="section__inner">
        <h2 class="section__title animate-item" data-animate="fade-up">예식 일시</h2>
        <div class="calendar animate-item" data-animate="scale-in" id="calendarGrid"></div>
        <div class="calendar-actions animate-item" data-animate="fade-up">
          <a class="btn btn--outline" id="googleCalBtn" href="#" target="_blank" rel="noopener">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01"/></svg>
            Google 캘린더
          </a>
          <button class="btn btn--outline" id="icsDownloadBtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/><path d="M12 14v4M10 16l2 2 2-2"/></svg>
            Apple 캘린더
          </button>
        </div>
      </div>
    </section>

    <!-- ─── Our Story Section ─── -->
    <section class="section story" id="story">
      <div class="section__inner">
        <h2 class="section__title animate-item" data-animate="fade-up" id="storyTitle"></h2>
        <p class="story__text animate-item" data-animate="fade-up" id="storyContent"></p>
        <div class="story__photos" id="storyPhotos"></div>
      </div>
    </section>

    <!-- ─── Gallery Section (Film Strip) ─── -->
    <section class="section gallery" id="gallery">
      <div class="section__inner">
        <h2 class="section__title animate-item" data-animate="fade-up">갤러리</h2>
        <div class="gallery__filmstrip">
          <div class="gallery__grid" id="galleryGrid"></div>
        </div>
      </div>
    </section>

    <!-- ─── Location Section ─── -->
    <section class="section location" id="location">
      <div class="section__inner">
        <h2 class="section__title animate-item" data-animate="fade-up">오시는 길</h2>
        <div class="location__info animate-item" data-animate="fade-up">
          <p class="location__venue" id="locationVenue"></p>
          <p class="location__hall" id="locationHall"></p>
          <p class="location__address" id="locationAddress"></p>
          <p class="location__tel" id="locationTel"></p>
        </div>
        <button class="btn btn--text location__copy animate-item" data-animate="fade-up" id="copyAddressBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          주소 복사
        </button>
        <div class="location__map animate-item" data-animate="scale-in">
          <img class="location__map-img" id="locationMapImg" src="" alt="약도" loading="lazy">
        </div>
        <div class="location__links animate-item" data-animate="fade-up">
          <a class="btn btn--kakao" id="kakaoMapBtn" href="#" target="_blank" rel="noopener">카카오맵</a>
          <a class="btn btn--naver" id="naverMapBtn" href="#" target="_blank" rel="noopener">네이버지도</a>
        </div>
      </div>
    </section>

    <!-- ─── RSVP Section (참석 의사) ─── -->
    <section class="section rsvp" id="rsvp">
      <div class="section__inner">
        <div class="rsvp__card animate-item" data-animate="scale-in">
          <div class="ornament">&#9993;</div>
          <h2 class="section__title" id="rsvpTitle">참석 의사 전달</h2>
          <p class="rsvp__desc" id="rsvpDesc"></p>
          <button type="button" class="rsvp__open-btn" id="rsvpOpenBtn">참석 의사 전달하기</button>
        </div>
      </div>
    </section>

    <!-- ─── Account Section (축의금) ─── -->
    <section class="section account" id="account">
      <div class="section__inner">
        <h2 class="section__title animate-item" data-animate="fade-up">마음 전하실 곳</h2>
        <p class="account__desc animate-item" data-animate="fade-up">축하의 마음을 담아 축의금을 전달해 보세요.</p>

        <!-- Groom Accounts -->
        <div class="accordion animate-item" data-animate="fade-up">
          <button class="accordion__trigger" id="groomAccordion" aria-expanded="false">
            <span class="accordion__icon">&#9834;</span>
            <span>신랑측 계좌번호</span>
            <svg class="accordion__arrow" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div class="accordion__panel" id="groomAccordionPanel">
            <div class="accordion__panel-inner" id="groomAccountList"></div>
          </div>
        </div>

        <!-- Bride Accounts -->
        <div class="accordion animate-item" data-animate="fade-up">
          <button class="accordion__trigger" id="brideAccordion" aria-expanded="false">
            <span class="accordion__icon">&#9834;</span>
            <span>신부측 계좌번호</span>
            <svg class="accordion__arrow" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div class="accordion__panel" id="brideAccordionPanel">
            <div class="accordion__panel-inner" id="brideAccountList"></div>
          </div>
        </div>
      </div>
    </section>

    <!-- ─── Footer ─── -->
    <footer class="footer">
      <p class="footer__text" id="footerText"></p>
    </footer>

  </main>

  <script src="script.js"></script>
</body>
</html>
